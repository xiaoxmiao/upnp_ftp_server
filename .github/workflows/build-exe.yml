name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyftpdlib pyasynchat pyasyncore pyinstaller miniupnpc
      
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile `
            --name ftp_server `
            --console `
            --hidden-import miniupnpc `
            --hidden-import pyftpdlib `
            --hidden-import pyftpdlib.handlers `
            --hidden-import pyftpdlib.handlers.ftp.control `
            --hidden-import pyftpdlib.handlers.ftp.data `
            --hidden-import pyftpdlib.handlers.ftp.dispatchers `
            --hidden-import pyftpdlib.handlers.ftp.producers `
            --hidden-import pyftpdlib.authorizers `
            --hidden-import pyftpdlib.filesystems `
            --hidden-import pyftpdlib.servers `
            --hidden-import pyftpdlib.ioloop `
            --hidden-import pyftpdlib.log `
            --hidden-import pyftpdlib.prefork `
            --hidden-import pyftpdlib.utils `
            ftp_server.py
      
      - name: Prepare release files
        run: |
          mkdir release
          copy dist\ftp_server.exe release\
          copy README.md release\
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
      
      - name: Upload EXE
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release/ftp_server.exe
          asset_name: ftp_server.exe
          asset_content_type: application/octet-stream
      
      - name: Upload README
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./README.md
          asset_name: README.md
          asset_content_type: text/markdown
      
      - name: Upload artifacts (manual workflow)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ftp_server-build
          path: release/
